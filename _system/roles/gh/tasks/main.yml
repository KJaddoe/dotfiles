---
- name: Install prerequisites (Ubuntu)
  become: true
  apt:
    name:
      - curl
      - ca-certificates
      - python3-debian
    state: present
    update_cache: yes
  when: ansible_facts.os_family == "Debian"

- name: Add GitHub CLI GPG key (Ubuntu)
  become: true
  get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /usr/share/keyrings/githubcli-archive-keyring.gpg
    mode: "0644"
  when: ansible_facts.os_family == "Debian"

- name: Add GitHub CLI repository (Ubuntu)
  become: true
  deb822_repository:
    name: github-cli
    types: deb
    uris: https://cli.github.com/packages
    suites: stable
    components: main
    architectures: "{{ ansible_architecture }}"
    signed_by: /usr/share/keyrings/githubcli-archive-keyring.gpg
    state: present
  when: ansible_facts.os_family == "Debian"

- name: Install GitHub CLI (Ubuntu)
  become: true
  apt:
    name: gh
    state: present
    update_cache: yes
  when: ansible_facts.os_family == "Debian"

- name: Install GitHub CLI (macOS)
  homebrew:
    name: gh
    state: present
  when: ansible_facts.os_family == "Darwin"

- name: Verify GitHub CLI installation
  command: gh --version
  register: gh_version
  changed_when: false

- name: Show GitHub CLI version
  debug:
    msg: "{{ gh_version.stdout_lines[0] }}"
