---
- name: Get installed Node versions from mise
  command: mise ls --installed node
  register: mise_node_installed
  changed_when: false

- name: Install and pin Node {{ node_version }} via mise
  command: mise use -g node@{{ node_version }}
  when: node_version|string not in mise_node_installed.stdout

- name: Install global npm packages
  command: mise exec -- npm install -g {{ npm_global_packages | join(' ') }}
  register: npm_global
  changed_when: "'added' in npm_global.stdout or 'changed' in npm_global.stdout"

- name: Verify Node installation
  command: mise exec -- node -v
  register: node_verify
  changed_when: false

- name: Show Node version
  debug:
    msg: "{{ node_verify.stdout }}"
