---
- name: Install Ruby build dependencies (Ubuntu)
  apt:
    name:
      - git
      - curl
      - build-essential
      - libssl-dev
      - libreadline-dev
      - zlib1g-dev
      - libyaml-dev
      - libgdbm-dev
      - libncurses5-dev
      - libffi-dev
      - libdb-dev
    state: present
    update_cache: yes
  become: true
  when: ansible_facts.os_family == "Debian"

- name: Install Ruby build dependencies (macOS)
  homebrew:
    name:
      - openssl@3
      - readline
      - libyaml
    state: present
  when: ansible_facts.os_family == "Darwin"

- name: Get current global Ruby from mise
  command: mise current ruby
  register: mise_ruby_current
  changed_when: false
  failed_when: false

- name: Install and pin Ruby {{ ruby_version }} via mise
  command: mise use -g ruby@{{ ruby_version }}
  when: mise_ruby_current.stdout | trim != ruby_version

- name: Install global Ruby gems
  command: mise exec -- gem install {{ ruby_global_gems | join(' ') }}
  register: gem_install
  changed_when: "'Successfully installed' in gem_install.stdout"

- name: Ensure ruby dotfiles directory exists
  file:
    path: "{{ ruby_dotfiles_dir }}"
    state: directory
  delegate_to: localhost
  run_once: true

- name: Symlink .gemrc
  file:
    src: "{{ ruby_dotfiles_dir }}/gemrc"
    dest: "{{ gemrc_path }}"
    state: link
    force: true

- name: Verify Ruby installation
  command: mise exec -- ruby -v
  register: ruby_version_output
  changed_when: false

- name: Show Ruby version
  debug:
    msg: "{{ ruby_version_output.stdout }}"
