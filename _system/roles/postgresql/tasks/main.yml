---
- name: Install PostgreSQL (Ubuntu)
  apt:
    name:
      - postgresql
      - postgresql-contrib
    state: present
    update_cache: yes
  become: true
  when: ansible_facts.os_family == "Debian"

- name: Install PostgreSQL (macOS)
  homebrew:
    name: postgresql
    state: present
  when: ansible_facts.os_family == "Darwin"

- name: Start PostgreSQL service (Linux)
  become: true
  systemd:
    name: postgresql
    state: started
    enabled: true
  when: ansible_facts.os_family == "Debian"

- name: Start PostgreSQL service (macOS)
  command: brew services start postgresql
  when: ansible_facts.os_family == "Darwin"

- name: Ensure postgres dotfiles directory exists
  file:
    path: '{{ postgresql_dotfiles_dir }}'
    state: directory
  delegate_to: localhost
  run_once: true

- name: Symlink .psqlrc
  file:
    src: '{{ postgresql_dotfiles_dir }}/psqlrc'
    dest: '{{ psqlrc_path }}'
    state: link
    force: true

- name: Symlink .psqlrc.local
  file:
    src: '{{ postgresql_dotfiles_dir }}/psqlrc.local'
    dest: '{{ psqlrc_local_path }}'
    state: link
    force: true

- name: Verify psql installation
  command: psql --version
  register: psql_version
  changed_when: false

- name: Show version
  debug:
    msg: 'PostgreSQL installed: {{ psql_version.stdout }}'
