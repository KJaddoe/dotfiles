---
- name: Install prerequisites (Ubuntu)
  become: true
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-debian
    state: present
    update_cache: yes
  when: ansible_facts.os_family == "Debian"

- name: Create keyrings directory
  become: true
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_facts.os_family == "Debian"

- name: Add Docker GPG key (modern keyring method)
  become: true
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when: ansible_facts.os_family == "Debian"

- name: Dearmor Docker GPG key
  become: true
  command: >
    gpg --dearmor -o /etc/apt/keyrings/docker.gpg /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.gpg
  when: ansible_facts.os_family == "Debian"

- name: Add Docker repository (Ubuntu)
  become: true
  deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/ubuntu
    suites: "{{ ansible_facts.lsb.codename }}"
    components: stable
    architectures: "{{ ansible_architecture }}"
    signed_by: /etc/apt/keyrings/docker.gpg
    state: present
  when: ansible_facts.os_family == "Debian"

- name: Install Docker Engine + Compose plugin (Ubuntu)
  become: true
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes
  when: ansible_facts.os_family == "Debian"

- name: Enable and start Docker service
  become: true
  service:
    name: docker
    enabled: true
    state: started
  when: ansible_facts.os_family == "Debian"

- name: Add user to docker group
  become: true
  user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: true
  when: ansible_facts.os_family == "Debian"

- name: Refresh group membership (avoid logout requirement)
  meta: reset_connection
  when: ansible_facts.os_family == "Debian"

- name: Install Docker Desktop (macOS)
  homebrew:
    name: --cask docker
    state: present
  when: ansible_facts.os_family == "Darwin"

- name: Create docker completions directory
  file:
    path: "{{ ansible_env.HOME }}/.docker/completions"
    state: directory
    mode: "0755"

- name: Generate docker zsh completion
  shell: docker completion zsh > {{ ansible_env.HOME }}/.docker/completions/_docker
  args:
    creates: "{{ ansible_env.HOME }}/.docker/completions/_docker"
  when: ansible_facts.os_family != "Darwin"

- name: Verify Docker installation
  command: docker --version
  register: docker_version
  changed_when: false

- name: Verify Docker Compose plugin
  command: docker compose version
  register: compose_version
  changed_when: false

- name: Show versions
  debug:
    msg:
      - "{{ docker_version.stdout }}"
      - "{{ compose_version.stdout }}"