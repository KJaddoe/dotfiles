- hosts: localhost
  vars:
    should_be_root: "{{ true if ansible_pkg_mgr != 'brew' else false }}"
  roles:
    # essentials
    - role: common
    - role: git
    - role: gnupg
    - role: ssh

    # languages
    - role: mise
    - role: uv
    - role: java
    - role: node
    - role: python
    - role: ruby

    # tools
    - role: docker
    - role: gh
    - role: delta
    - role: jq
    - role: shfmt
    - role: fzf
    - role: zoxide
    - role: eza
    - role: bat
    - role: fswatch
    - role: neovim

    # databases
    - role: postgresql
    - role: pgformatter
    - role: sqlcmd

    # terminal
    - role: ghostty

    # mobile / react native
    - role: watchman
    - role: android
