- clean: ['~/.config', '/etc/wsl.conf']

- link:
    ~/.config/nvim: nvim/config
    ~/.gvimrc: nvim/gvimrc
    ~/.editorconfig: editorconfig/editorconfig
    ~/.eslintrc.json: eslint/eslintrc.json
    ~/.gitignore: git/gitignore
    ~/.gitattributes: git/gitattributes
    ~/.gitconfig.local: git/gitconfig.local
    ~/.npmrc: node/npmrc
    ~/.gemrc: ruby/gemrc
    ~/.psqlrc: postgres/psqlrc
    ~/.psqlrc.local: postgres/psqlrc.local
    ~/.p10k.zsh: powerlevel10k/p10k.zsh
    ~/.prettierrc.json: prettier/prettierrc.json
    ~/.tern-config: tern/tern-config
    ~/.tmux.conf: tmux/tmux.conf
    ~/.zshrc: zsh/zshrc
    ~/.zsh_plugins.txt: antidote/zsh_plugins.txt
    ~/.bashrc: bash/bashrc
    ~/.config/tmux-powerline/config.sh: tmux/tmux-powerline.config.sh
    ~/.config/ghostty/config:
      path: ghostty/config
      create: true
    ~/.claude/settings.json:
      path: claude/settings.json
      create: true
    ~/.claude/CLAUDE.md:
      path: claude/CLAUDE.md
      create: true
    ~/.claude/hooks:
      path: claude/hooks
      create: true
    ~/.claude/memory:
      path: claude/memory
      create: true
    ~/.claude/keybindings.json:
      path: claude/keybindings.json
      create: true
    ~/.claude/skills:
      path: claude/skills
      create: true

- shell:
    - [git submodule update --init --recursive, Installing submodules]
