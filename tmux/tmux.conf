# Automatically set window title and don't let it change
set-option -g set-titles on
set-option -g allow-rename off

# Renumber windows
set-option -g renumber-windows on

#Use 256 color
set -g default-terminal "tmux-256color"
#Use RGB color
set -as terminal-features ",*:RGB"

# Extended keys + passthrough (modified keys, fullscreen TUI apps)
set -s extended-keys on
set -as terminal-features ",*:extkeys"
set -g allow-passthrough on

# Mouse support
set -g mouse on

# ----------------------- Plugins -----------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'erikw/tmux-powerline'

# Fuzzy session/window/pane switcher (prefix + F)
set -g @plugin 'sainnhe/tmux-fzf'

# Persist and auto-restore sessions across restarts
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'


run '~/.tmux/plugins/tpm/tpm'
